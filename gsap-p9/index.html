<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSAP Flip</title>
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
     <link rel="stylesheet" href="style.css">
</head>
</head>
<body class="overflow-hidden">

<div class="scene">
  <!-- Image 2 — underneath, always visible -->
  <div class="slide slide-2">
    <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?q=80&w=1074&auto=format&fit=crop" alt="" />
  </div>

  <!-- Image 1 — on top, gets clipped away -->
  <div class="slide slide-1" id="slide1">
    <img src="https://images.unsplash.com/photo-1782318691186-1d909c479de4?q=80&w=1074&auto=format&fit=crop&ixlib=rb-4.1.0" alt="" />
  </div>
</div>

<button id="trigger">Reveal Next</button>

    
</body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js" integrity="sha512-NcZdtrT77bJr4STcmsGAESr06BYGE8woZdSdEgqnpyqac7sugNO+Tr4bGwGF3MsnEkGKhU2KL2xh6Ec+BqsaHA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/ScrollTrigger.min.js" integrity="sha512-P2IDYZfqSwjcSjX0BKeNhwRUH8zRPGlgcWl5n6gBLzdi4Y5/0O4zaXrtO4K9TZK6Hn1BenYpKowuCavNandERg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

<script src="script.js"></script>

</html>
